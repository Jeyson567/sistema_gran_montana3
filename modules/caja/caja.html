<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caja | GRAN MONTANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/tickets.css" />
  </head>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen app-body">
    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>
    <div class="app-shell">
      <aside id="sidebar" class="app-sidebar"></aside>
      <div class="app-main">
        <header class="app-topbar">
          <button type="button" id="sidebar-toggle" class="app-menu-btn" aria-expanded="false" aria-controls="sidebar">
            <span aria-hidden="true">☰</span> Menú
          </button>
          <span class="app-topbar-title">Caja</span>
        </header>
      <main class="app-content flex-1 p-4 sm:p-6 overflow-auto">
        <h1 class="text-2xl font-bold mb-2">Caja</h1>
        <p class="text-zinc-400 mb-6">Cobro de mesas — propina manual</p>

        <section id="view-cobros">
          <h2 class="text-lg font-semibold mb-3">Mesas por cobrar</h2>
          <div id="cashier-list" class="cashier-grid"></div>
        </section>

        <section id="view-historial" class="hidden mt-8">
          <h2 class="text-lg font-semibold mb-3">Historial de tickets</h2>
          <div class="table-scroll-wrap rounded-2xl border border-zinc-800 bg-zinc-900">
            <table class="w-full text-sm">
              <thead class="text-zinc-400 border-b border-zinc-800">
                <tr>
                  <th class="p-3 text-left">Ticket</th>
                  <th class="p-3 text-left">Mesa</th>
                  <th class="p-3 text-right">Subtotal</th>
                  <th class="p-3 text-right">Propina</th>
                  <th class="p-3 text-right">Total</th>
                  <th class="p-3">Pago</th>
                  <th class="p-3"></th>
                </tr>
              </thead>
              <tbody id="historial-ventas"></tbody>
            </table>
          </div>
        </section>
      </main>
      </div>
    </div>
    <div id="toast-root" class="fixed top-4 right-4 z-[60] space-y-2"></div>
    <script type="module" src="./caja.js"></script>
  </body>
</html>
