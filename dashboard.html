<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | GRAN MONTANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./css/global.css" />
  </head>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="flex min-h-screen">
      <aside id="sidebar" class="w-72 bg-zinc-900 border-r border-zinc-800 p-4 flex flex-col shrink-0"></aside>
      <main class="flex-1 p-6">
        <header class="mb-6 flex items-center justify-between">
          <h1 class="text-2xl font-bold">GRAN MONTANA</h1>
          <p class="text-zinc-400 text-sm">Panel principal</p>
        </header>
        <section id="dashboard-content" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></section>
      </main>
    </div>
    <div id="toast-root" class="fixed top-4 right-4 z-50 space-y-2"></div>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
